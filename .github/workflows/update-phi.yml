name: Update PHI feed

# PrivateHealth.gov.au publishes a new release ~monthly (1st of month).
# We run a few days in to be safe, plus allow manual runs.
on:
  schedule:
    - cron: "0 19 5 * *"   # 05:00 AEST on the 5th (19:00 UTC prior day)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Harvest latest PHIS data
        run: python3 harvest.py

      - name: Commit refreshed feed
        run: |
          git config user.name  "phi-feed-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes this run."
          else
            MONTH=$(python3 -c "import json;print(json.load(open('data/manifest.json'))['sourceMonth'])")
            git commit -m "Update PHI feed — ${MONTH}"
            git push
          fi
